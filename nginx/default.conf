# Map for WebSocket connections
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;

  # Docker's embedded DNS. Required because every upstream below is referenced
  # through a variable: that forces nginx to re-resolve the container name per
  # request (honouring this TTL) instead of caching the IP at startup.
  # Without this, recreating webapp/facilitator (e.g. `docker compose up -d --build`)
  # while the nginx container keeps running leaves nginx pointing at dead IPs,
  # which surfaces as a permanent 502 until nginx is restarted.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  set $upstream_webapp         http://webapp:3000;
  set $upstream_facilitator    http://facilitator:3000;
  set $upstream_remote_desktop http://remote-desktop:6901;

  # Disable caching globally
  add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  add_header Pragma "no-cache" always;
  add_header Expires "0" always;

  # Web application
  location / {
    proxy_pass $upstream_webapp$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache 1;
  }

  # Facilitator API: /facilitator/api/<path>  ->  /api/<path>
  location /facilitator/api/ {
    rewrite ^/facilitator/api/(.*)$ /api/$1 break;
    proxy_pass $upstream_facilitator;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache 1;
  }

  # VNC WebSocket proxy with improved WebSocket handling
  location /vnc-proxy/ {
    proxy_pass $upstream_webapp$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache 1;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
  }

  # Direct WebSocket connection to VNC server
  location /websockify {
    proxy_pass $upstream_remote_desktop$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache 1;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 "healthy\n";
  }

  # Error handling. Served by nginx itself: proxying the error page to an
  # upstream that is already failing is what makes a 502 look like a hard outage.
  error_page 500 502 503 504 /ckx-50x;
  location = /ckx-50x {
    internal;
    default_type text/html;
    return 503 '<!doctype html><meta charset="utf-8"><title>Starting up</title><body style="font-family:system-ui;background:#0b1622;color:#e8f0f7;display:grid;place-items:center;height:100vh;margin:0"><div style="text-align:center;max-width:34rem"><h1 style="font-weight:600">Service starting</h1><p style="color:#7e99b3;line-height:1.6">A backend container is still coming up or was just recreated. This page refreshes automatically.</p><p style="color:#7e99b3;font-family:ui-monospace,monospace;font-size:.85rem">docker compose logs -f webapp facilitator</p></div><script>setTimeout(function(){location.reload()},4000)</script>';
  }
}
