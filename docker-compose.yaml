services:
  # VNC Server (Ubuntu)
  remote-desktop:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-remote-desktop:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./remote-desktop
      args:
        # Desktop base image. Override to roll back if a new upstream tag misbehaves:
        #   VNC_BASE_IMAGE=consol/ubuntu-xfce-vnc:1.3.0   (old 16.04 base, deprecated)
        #   VNC_BASE_IMAGE=ckx/vnc-base:local             (self-hosted, see vnc-base/)
        VNC_BASE_IMAGE: ${VNC_BASE_IMAGE:-consol/debian-xfce-vnc:nightly}
    hostname: terminal
    expose:
      - "5901" # VNC port (internal only)
      - "6901" # Web VNC port (internal only)
    # Browsers in this image crash at higher resolutions because a container's
    # default /dev/shm is only 64MB. ConSol documents --shm-size as the fix.
    shm_size: "256m"
    environment:
      - VNC_PW=bakku-the-wizard
      - VNC_PASSWORD=bakku-the-wizard
      - VNC_VIEW_ONLY=false
      - VNC_RESOLUTION=1280x800
      # TigerVNC's vncserver resolves the invoking user from USER/LOGNAME. In a
      # container started as root with no login shell these are often unset, and
      # newer TigerVNC then refuses to start Xvnc - the noVNC page still serves on
      # 6901 while nothing listens on 5901, which the browser reports as
      # "connection is closed". Setting them explicitly is harmless either way.
      - USER=root
      - LOGNAME=root
      # Set true only if a wallpaper still appears: drops xfdesktop entirely and
      # leaves a solid root window (no desktop icons or right-click menu).
      - CKX_KILL_XFDESKTOP=false
    healthcheck:
      # Verify the noVNC web server (6901) AND that Xvnc is actually running.
      #
      # NEVER open a TCP connection to 5901 from here. TigerVNC counts repeated
      # connect-then-drop as a brute-force attempt and blacklists the source IP;
      # because websockify proxies from 127.0.0.1, blacklisting localhost kills
      # the real desktop session and the browser reports "connection is closed".
      # The X11 socket exists only while Xvnc is alive, so it proves the same
      # thing without touching the VNC port.
      test: ["CMD-SHELL", "curl -sf http://localhost:6901/ >/dev/null && [ -S /tmp/.X11-unix/X1 ]"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 1024
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - ckx-network

  # Web Application (not directly exposed to users)
  webapp:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-webapp:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./app
    expose:
      - "3000" # Only exposed to internal network
    environment:
      - VNC_SERVICE_HOST=remote-desktop
      - VNC_SERVICE_PORT=6901
      - VNC_PASSWORD=bakku-the-wizard
      - SSH_HOST=remote-terminal
      - SSH_PORT=22
      - SSH_USER=candidate
      - SSH_PASSWORD=password
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 512
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ckx-network

  # Nginx Reverse Proxy - ONLY SERVICE EXPOSED TO USERS
  nginx:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-nginx:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./nginx
    depends_on:
      - webapp
      - remote-desktop
      - remote-terminal
      - facilitator
      - k8s-api-server
    ports:
      - "30080:80" # Expose Nginx on port 30080
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 256
          cpus: "0.2"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ckx-network

  # Optional self-hosted desktop base (Ubuntu 22.04) replacing the EOL 16.04
  # ConSol image. Built only when asked for:
  #   docker compose --profile vncbase build vnc-base
  #   docker compose build --build-arg VNC_BASE_IMAGE=ckx/vnc-base:local remote-desktop
  vnc-base:
    profiles: ["vncbase"]
    image: ckx/vnc-base:local
    pull_policy: build
    build:
      context: ./vnc-base
    entrypoint: ["/bin/true"]
    restart: "no"

  # Jump Host (internal validation host; candidates never ssh here).
  # NOTE: its hostname must NOT collide with any candidate-facing alias
  # (it used to be 'ckad9999', which also aliased the cluster node and made
  #  `ssh ckad9999` resolve to two different hosts / SSH host keys).
  jumphost:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-jumphost:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./jumphost
    hostname: controlplane
    # Candidate-facing name. This is the machine questions tell you to ssh into:
    # setup scripts and validators run here, so filesystem tasks must land here.
    privileged: true
    # No external port mappings - only accessible internally
    expose:
      - "22" # SSH port (internal only)
    volumes:
      - kube-config:/home/candidate/.kube # Shared volume for Kubernetes config
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 1024
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      ckx-network:
        aliases:
          - controlplane
          - jumphost      # facilitator connects by this name (SSH_HOST)
          - ckad9999      # legacy name kept so older question text still resolves
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Remote Terminal Service
  remote-terminal:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-remote-terminal:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./remote-terminal
    hostname: remote-terminal
    expose:
      - "22" # SSH port (internal only)
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 256
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    networks:
      - ckx-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 10s
      timeout: 5s
      retries: 3

  # KIND Kubernetes Cluster
  k8s-api-server: # Service name that will be used for DNS resolution
    # This container is privileged and runs dind + k3s, so it is the one most
    # able to hurt the host. nofile is high because containerd legitimately
    # needs it; the process cap is in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Per-container disk quota. Requires overlay2 on XFS with the 'pquota' mount
    # option (or btrfs/devicemapper). On Docker Desktop the VM filesystem is ext4,
    # where this option makes the container refuse to start, so it is opt-in.
    # There, cap disk via Settings > Resources > Disk image size instead.
    # See docs/RESOURCE-LIMITS.md
    # storage_opt:
    #   size: "20G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-cluster:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./kind-cluster
    container_name: kind-cluster
    hostname: cluster
    privileged: true # Required for running containers inside KIND
    expose:
      - "6443"
      - "22"
    volumes:
      - kube-config:/home/candidate/.kube # Shared volume for Kubernetes config
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 8192
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    networks:
      ckx-network:
        aliases:
         - cluster   # internal only; candidates do not ssh here
    healthcheck:
      test: ["CMD", "ls", "/ready"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 60s

  # Redis Database for Facilitator
  redis:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: redis:alpine
    hostname: redis
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - ckx-network
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 256
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Facilitator Service
  facilitator:
    # Cap file descriptors; fd exhaustion is its own denial-of-service vector.
    # The process cap lives in deploy.resources.limits.pids below.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    # Bound log growth so a chatty or looping container cannot fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    image: ckx/ck-x-simulator-facilitator:local
    pull_policy: build   # never pull from a remote registry; always build locally
    build:
      context: ./facilitator
      dockerfile: Dockerfile
    hostname: facilitator
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=prod
      - SSH_HOST=jumphost
      - SSH_PORT=22
      - SSH_USERNAME=candidate
      - LOG_LEVEL=info
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TRACK_METRICS=true # based on the environment variable TRACK_METRICS, the facilitator will send metrics to the metric server
      - NODE_TLS_REJECT_UNAUTHORIZED=0 # accept self-signed certs (e.g. behind corporate TLS inspection) so outbound HTTPS doesn't fail
    restart: unless-stopped
    depends_on:
      - jumphost
      - redis
    networks:
      - ckx-network
    deploy:
      resources:
        limits:
          # pids caps process count: this, not cpu/memory, is what stops a fork bomb.
          pids: 512
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  ckx-network:
    name: ckx-network
    driver: bridge

volumes:
  kube-config: # Shared volume for Kubernetes configuration
